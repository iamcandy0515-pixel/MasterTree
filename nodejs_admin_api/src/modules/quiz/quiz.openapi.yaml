openapi: 3.0.0
info:
  title: Quiz API Specification
  version: 1.0.0
  description: API for managing quizzes, batch processing, and mobile-optimized search.

paths:
  /api/quiz:
    get:
      summary: Get all quizzes
      tags: [Search]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: subject
          schema:
            type: string
        - in: query
          name: year
          schema:
            type: integer
        - in: query
          name: round
          schema:
            type: integer
        - in: query
          name: difficulty
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: minimal
          description: Returns lightweight quiz data (pruned explanation, thumbnail mapping).
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful retrieval

  /api/quiz/upsert:
    post:
      summary: Create or update a single quiz
      tags: [Management]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success

  /api/quiz/upsert-batch:
    post:
      summary: Atomic batch upsert for quizzes
      tags: [Bulk]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All items saved successfully

  /api/quiz/upsert-related-bulk:
    post:
      summary: Update related quiz mappings in bulk
      tags: [Bulk]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Mapping updated

  /api/quiz/{id}:
    delete:
      summary: Delete a quiz and cleanup related images
      tags: [Management]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted
