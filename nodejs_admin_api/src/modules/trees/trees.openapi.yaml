openapi: 3.0.0
info:
  title: Trees API Specification
  version: 1.0.0
  description: API for managing trees and related data. Optimized for mobile loads.

paths:
  /api/trees:
    get:
      summary: Get all trees
      tags: [Trees]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: minimal
          description: If true, returns only essential fields for mobile list view (id, name_kr, scientific_name, category, image_url).
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful retrieval
    post:
      summary: Create new tree
      tags: [Trees]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created
  
  /api/trees/{id}:
    put:
      summary: Update existing tree
      tags: [Trees]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete tree
      tags: [Trees]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted

  /api/trees/random:
    get:
      summary: Get random trees for quiz distractors
      tags: [Data]
      parameters:
        - in: query
          name: count
          schema:
            type: integer
            default: 3
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: excludeName
          schema:
            type: string
      responses:
        '200':
          description: Random list retrieved

  /api/trees/stats:
    get:
      summary: Get tree statistics
      tags: [Data]
      responses:
        '200':
          description: Stats retrieved

  /api/trees/export:
    get:
      summary: Export trees to CSV
      tags: [Data]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: CSV file download

  /api/trees/import:
    post:
      summary: Import trees from CSV
      tags: [Data]
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Import success/summary
